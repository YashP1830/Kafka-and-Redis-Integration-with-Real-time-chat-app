name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_FRONTEND: ${{ github.repository }}/frontend

jobs:
  # -------------------------------------------------------------------
  # 1. Lint + sanity-check both apps on every push and PR
  # -------------------------------------------------------------------
  lint-and-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Syntax-check backend source
        working-directory: backend
        run: |
          for f in $(find src -name "*.js"); do node --check "$f"; done

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # -------------------------------------------------------------------
  # 2. Build & push Docker images (backend + frontend) — main branch only
  # -------------------------------------------------------------------
  build-and-push:
    needs: lint-and-build-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------
  # 3. Deploy — placeholder. Wire this up to your actual host
  #    (SSH + `docker compose pull && up -d`, a Kubernetes rollout,
  #    a PaaS webhook, etc.) once you have a target server.
  # -------------------------------------------------------------------
  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy step (placeholder)
        run: |
          echo "Images pushed to GHCR:"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest"
          echo "Add an SSH/kubectl/PaaS deploy step here, e.g.:"
          echo "  ssh user@server 'cd /app && docker compose pull && docker compose up -d'"
